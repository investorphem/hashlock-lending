name: Build and Publish SDK

on:
  push:
    branches:
      - main
    # Only trigger this workflow if files in the hashlock-sdk folder change
    paths:
      - 'hashlock-sdk/**'

# Tell all 'run' commands to execute inside your specific subfolder
defaults:
  run:
    working-directory: ./hashlock-sdk

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # 3. Install clean dependencies inside hashlock-sdk
      - name: Install Dependencies
        run: npm ci

      # 4. Compile TypeScript source files
      - name: Compile SDK
        run: npm run build

      # 5. Authenticate and publish securely to npm
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
